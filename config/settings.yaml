runtime:
  ollama_base_url: "http://localhost:11434"
  request_timeout_seconds: 120

debate:
  language: "Spanish"
  max_rounds: 8
  referee_interval: 1
  max_response_words: 180

prompt_repository:
  directory: "prompts"
  opening_prompt_file: "opening_instruction.j2"

context_policy:
  context_window: 30000
  usage_threshold_ratio: 0.85
  response_buffer_tokens: 512
  preserve_recent_messages: 4
  compact_summary_max_chars: 3200

models:
  debater_a:
    name: "gemma4:e4b"
    temperature: 0.7
    keep_alive: "5m"
    prompt_file: "debater.j2"

  debater_b:
    name: "gemma4:e4b"
    temperature: 0.7
    keep_alive: "5m"
    prompt_file: "debater.j2"

  referee:
    name: "gemma4:e4b"
    temperature: 0.2
    keep_alive: "5m"
    prompt_file: "referee_review.j2"

  compactor:
    name: "gemma4:e4b"
    temperature: 0.1
    keep_alive: "5m"
    prompt_file: "compactor.j2"
